<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포스트잇 질문 활동</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: linear-gradient(135deg, #FF8C42 0%, #FF6B1A 55%, #F5A623 100%);
  min-height: 100vh;
}

/* ── Hero ── */
.hero { padding: 28px 20px 20px; }
.hero-tag {
  background: rgba(255,255,255,0.25); border-radius: 50px;
  padding: 6px 16px; display: inline-block; color: white;
  font-size: 12px; margin-bottom: 14px; letter-spacing: 0.3px;
}
.hero-title { color: white; font-size: 32px; font-weight: 900; margin-bottom: 4px; }
.hero-sub { color: rgba(255,255,255,0.75); font-size: 12px; margin-bottom: 18px; }

/* ── Question Cards ── */
.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.q-card {
  border-radius: 16px; padding: 18px 16px 20px; cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.q-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.q-card:active { transform: translateY(0); }
.qc-y { background: #FFD93D; }
.qc-b { background: #4FACFE; }
.card-head { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.qc-b .card-head { color: white; }
.card-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
.dot-y { background: radial-gradient(circle at 35% 35%, #FFF8A0, #D4A500); }
.dot-b { background: radial-gradient(circle at 35% 35%, #B8D8FF, #2260AA); }
.card-q { font-size: 15px; line-height: 1.55; color: #1a1a1a; }
.qc-b .card-q { color: white; }
.card-hint { margin-top: 8px; font-size: 11px; color: rgba(0,0,0,0.38); }
.qc-b .card-hint { color: rgba(255,255,255,0.6); }

/* ── Input Section ── */
#inputSection {
  display: none; background: rgba(0,0,0,0.18); padding: 20px;
}
#inputSection.open { display: block; animation: slideUp 0.22s ease; }
@keyframes slideUp {
  from { opacity:0; transform:translateY(14px); }
  to   { opacity:1; transform:translateY(0);    }
}
.input-label    { color: rgba(255,255,255,0.75); font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.input-question { color: white; font-size: 17px; font-weight: 700; margin-bottom: 12px; }
.ans-area {
  width: 100%; border-radius: 12px; border: none;
  padding: 12px 14px; font-size: 15px; font-family: inherit;
  resize: none; height: 80px;
  background: rgba(255,255,255,0.92); color: #1a1a1a;
  outline: none; margin-bottom: 10px; display: block;
}
.input-row { display: flex; gap: 8px; }
.name-field {
  flex: 1; border-radius: 10px; border: none;
  padding: 10px 12px; font-size: 14px; font-family: inherit;
  background: rgba(255,255,255,0.82); color: #1a1a1a; outline: none;
}
.cancel-btn {
  background: rgba(255,255,255,0.2); color: white; border: none;
  border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; cursor: pointer;
}
.post-btn {
  background: white; color: #FF6B1A; border: none;
  border-radius: 10px; padding: 10px 16px; font-size: 14px;
  font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap;
  transition: opacity 0.15s;
}
.post-btn:disabled { opacity: 0.55; }

/* ── Board ── */
#boardSection { background: #FFF8F0; padding: 20px; min-height: 220px; }
.board-tabs { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.tab {
  padding: 7px 15px; border-radius: 50px; border: none;
  font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; transition: all 0.15s;
}
.tab-y-on { background: #FFD93D; color: #333; }
.tab-b-on { background: #4FACFE; color: white; }
.tab-off   { background: #e8e2d8; color: #999; }
.board-count { font-size: 12px; color: #ccc; margin-left: auto; }

.sticky-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
.sticky {
  border-radius: 10px; padding: 12px 13px; min-height: 80px;
  box-shadow: 2px 3px 10px rgba(0,0,0,0.09);
  animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn {
  from { transform:scale(0.82); opacity:0; }
  to   { transform:scale(1);    opacity:1; }
}
.sticky-y { background: #FFD93D; }
.sticky-b { background: #4FACFE; }
.sticky-text   { font-size: 14px; color: #1a1a1a; line-height: 1.5; word-break: break-word; margin-bottom: 6px; }
.sticky-b .sticky-text   { color: white; }
.sticky-author { font-size: 11px; color: rgba(0,0,0,0.38); text-align: right; }
.sticky-b .sticky-author { color: rgba(255,255,255,0.65); }
.empty-note { text-align: center; color: #ccc; font-size: 14px; padding: 36px 0; line-height: 1.9; }
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #4CAF50; display: inline-block;
  margin-right: 5px; animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:0.4; }
}

/* ── Toast ── */
#toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(70px);
  background: #1a1a1a; color: white; padding: 10px 22px;
  border-radius: 50px; font-size: 13px; font-family: inherit;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 9999; white-space: nowrap; pointer-events: none;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">활동</div>
  <div class="hero-title">포스트잇 질문</div>
  <div class="hero-sub" id="heroSub">
    <span class="status-dot"></span>답변을 불러오는 중...
  </div>
  <div class="cards-row">
    <div class="q-card qc-y" onclick="openInput('yellow')">
      <div class="card-head"><span class="card-dot dot-y"></span>노랑 포스트잇</div>
      <div class="card-q">공짜로라도<br>하고 싶은 일은?</div>
      <div class="card-hint">탭해서 답변하기 ↓</div>
    </div>
    <div class="q-card qc-b" onclick="openInput('blue')">
      <div class="card-head"><span class="card-dot dot-b"></span>파랑 포스트잇</div>
      <div class="card-q">세상이 지금<br>필요로 하는 일은?</div>
      <div class="card-hint">탭해서 답변하기 ↓</div>
    </div>
  </div>
</div>

<!-- Input -->
<div id="inputSection">
  <div class="input-label" id="iLabel"></div>
  <div class="input-question" id="iQuestion"></div>
  <textarea class="ans-area" id="ansText" placeholder="여기에 답변을 써보세요..."></textarea>
  <div class="input-row">
    <input class="name-field" id="nameField" type="text" placeholder="이름 (선택, 최대 10자)" maxlength="10">
    <button class="cancel-btn" onclick="closeInput()">취소</button>
    <button class="post-btn" id="postBtn" onclick="submitAnswer()">붙이기 ✓</button>
  </div>
</div>

<!-- Board -->
<div id="boardSection">
  <div class="board-tabs">
    <button class="tab tab-y-on" id="tabY" onclick="switchTab('yellow')">🟡 노랑</button>
    <button class="tab tab-off"  id="tabB" onclick="switchTab('blue')">🔵 파랑</button>
    <span class="board-count" id="boardCount"></span>
  </div>
  <div id="boardGrid"></div>
</div>

<div id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbw4qsCZ56kRRAu0uB_dK5AJJLePjy2G0G0s2J0j46sGluiOWes1cnWDyez6MEe2cbFC/exec';

const Q = {
  yellow: { label: '노랑 포스트잇', q: '공짜로라도 하고 싶은 일은?' },
  blue:   { label: '파랑 포스트잇', q: '세상이 지금 필요로 하는 일은?' }
};

let activeColor = null;
let curTab = 'yellow';
let data   = { yellow: [], blue: [] };

// JSONP helper
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const id     = 'cb_' + Math.random().toString(36).slice(2);
    const script = document.createElement('script');
    window[id] = (d) => { cleanup(); resolve(d); };
    script.src    = url + (url.includes('?') ? '&' : '?') + 'callback=' + id + '&_=' + Date.now();
    script.onerror = () => { cleanup(); reject(new Error('Network')); };
    document.head.appendChild(script);
    const t = setTimeout(() => { cleanup(); reject(new Error('Timeout')); }, 10000);
    function cleanup() { clearTimeout(t); delete window[id]; script.remove(); }
  });
}

async function fetchData() {
  try {
    const res = await jsonp(GAS_URL + '?action=get');
    if (res && res.yellow !== undefined) {
      data = res;
      renderBoard(curTab);
      updateSub();
    }
  } catch(e) { console.warn('Poll:', e); }
}

function openInput(color) {
  activeColor = color;
  document.getElementById('iLabel').textContent    = Q[color].label;
  document.getElementById('iQuestion').textContent = Q[color].q;
  document.getElementById('ansText').value  = '';
  document.getElementById('nameField').value = '';
  const sec = document.getElementById('inputSection');
  sec.classList.remove('open'); void sec.offsetWidth; sec.classList.add('open');
  setTimeout(() => document.getElementById('ansText').focus(), 80);
}

function closeInput() {
  document.getElementById('inputSection').classList.remove('open');
  activeColor = null;
}

async function submitAnswer() {
  const text = document.getElementById('ansText').value.trim();
  if (!text) { showToast('답변을 입력해 주세요 😊'); return; }
  const name = document.getElementById('nameField').value.trim() || '익명';
  const btn  = document.getElementById('postBtn');
  btn.disabled = true; btn.textContent = '전송 중...';
  try {
    await jsonp(GAS_URL
      + '?action=post'
      + '&color=' + encodeURIComponent(activeColor)
      + '&name='  + encodeURIComponent(name)
      + '&text='  + encodeURIComponent(text));
    closeInput(); switchTab(activeColor);
    await fetchData();
    showToast('포스트잇이 붙었어요! 🎉');
  } catch(e) { showToast('오류가 발생했어요. 다시 시도해 주세요.'); }
  btn.disabled = false; btn.textContent = '붙이기 ✓';
}

function switchTab(color) {
  curTab = color;
  renderBoard(color); updateSub();
  document.getElementById('tabY').className = 'tab ' + (color==='yellow' ? 'tab-y-on' : 'tab-off');
  document.getElementById('tabB').className = 'tab ' + (color==='blue'   ? 'tab-b-on' : 'tab-off');
}

function renderBoard(color) {
  const list = data[color] || [];
  const grid = document.getElementById('boardGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-note">아직 답변이 없어요.<br>첫 번째로 붙여보세요! 📝</div>';
    return;
  }
  const cls = color === 'yellow' ? 'sticky-y' : 'sticky-b';
  grid.innerHTML = '<div class="sticky-grid">'
    + list.slice().reverse().map(item =>
        '<div class="sticky ' + cls + '">'
        + '<div class="sticky-text">' + esc(item.text) + '</div>'
        + '<div class="sticky-author">— ' + esc(item.name) + '</div>'
        + '</div>'
      ).join('') + '</div>';
}

function updateSub() {
  const total = (data.yellow||[]).length + (data.blue||[]).length;
  document.getElementById('heroSub').innerHTML =
    '<span class="status-dot"></span>총 ' + total + '개의 답변이 모였어요';
  document.getElementById('boardCount').textContent = (data[curTab]||[]).length + '개';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

// Start
fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
