
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>포스트잇 질문 활동</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: linear-gradient(135deg,#FF8C42 0%,#FF6B1A 55%,#F5A623 100%); min-height: 100vh; }

.hero { padding: 28px 20px 20px; }
.hero-tag { background: rgba(255,255,255,0.25); border-radius: 50px; padding: 6px 16px; display: inline-block; color: white; font-size: 12px; margin-bottom: 14px; }
.hero-title { color: white; font-size: 32px; font-weight: 900; margin-bottom: 4px; }
.hero-sub { color: rgba(255,255,255,0.75); font-size: 12px; margin-bottom: 18px; display: flex; align-items: center; gap: 6px; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; flex-shrink: 0; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.q-card { border-radius: 16px; padding: 18px 16px 20px; cursor: pointer; transition: transform .15s, box-shadow .15s; -webkit-tap-highlight-color: transparent; }
.q-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
.q-card:active { transform: translateY(0); }
.qc-y { background: #FFD93D; }
.qc-b { background: #4FACFE; }
.card-head { font-size: 14px; font-weight: 700; color: #1a1a1a; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.qc-b .card-head { color: white; }
.cdot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
.cdot-y { background: radial-gradient(circle at 35% 35%,#FFF8A0,#D4A500); }
.cdot-b { background: radial-gradient(circle at 35% 35%,#B8D8FF,#2260AA); }
.card-q { font-size: 15px; line-height: 1.55; color: #1a1a1a; }
.qc-b .card-q { color: white; }
.card-hint { margin-top: 8px; font-size: 11px; color: rgba(0,0,0,.38); }
.qc-b .card-hint { color: rgba(255,255,255,.6); }

#inputSection { display: none; background: rgba(0,0,0,.18); padding: 20px; }
#inputSection.open { display: block; animation: slideUp .22s ease; }
@keyframes slideUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
.il { color: rgba(255,255,255,.75); font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.iq { color: white; font-size: 17px; font-weight: 700; margin-bottom: 12px; }
.ans-area { width: 100%; border-radius: 12px; border: none; padding: 12px 14px; font-size: 15px; font-family: inherit; resize: none; height: 80px; background: rgba(255,255,255,.92); color: #1a1a1a; outline: none; margin-bottom: 10px; display: block; }
.irow { display: flex; gap: 8px; }
.nfield { flex: 1; border-radius: 10px; border: none; padding: 10px 12px; font-size: 14px; font-family: inherit; background: rgba(255,255,255,.82); color: #1a1a1a; outline: none; }
.cbtn { background: rgba(255,255,255,.2); color: white; border: none; border-radius: 10px; padding: 10px 12px; font-size: 13px; font-family: inherit; cursor: pointer; }
.pbtn { background: white; color: #FF6B1A; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; transition: opacity .15s; }
.pbtn:disabled { opacity: .55; }

#boardSection { background: #FFF8F0; padding: 20px; min-height: 220px; }
.btabs { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.tab { padding: 7px 15px; border-radius: 50px; border: none; font-size: 13px; font-family: inherit; font-weight: 700; cursor: pointer; transition: all .15s; }
.ty { background: #FFD93D; color: #333; }
.tb { background: #4FACFE; color: white; }
.toff { background: #e8e2d8; color: #999; }
.bcnt { font-size: 12px; color: #ccc; margin-left: auto; }

.sgrid { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 10px; }
.sticky { border-radius: 10px; padding: 12px 13px; min-height: 80px; box-shadow: 2px 3px 10px rgba(0,0,0,.09); animation: popIn .25s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{transform:scale(.82);opacity:0} to{transform:scale(1);opacity:1} }
.sy { background: #FFD93D; }
.sb { background: #4FACFE; }
.st { font-size: 14px; color: #1a1a1a; line-height: 1.5; word-break: break-word; margin-bottom: 6px; }
.sb .st { color: white; }
.sa { font-size: 11px; color: rgba(0,0,0,.38); text-align: right; }
.sb .sa { color: rgba(255,255,255,.65); }
.empty { text-align: center; color: #ccc; font-size: 14px; padding: 36px 0; line-height: 1.9; }

#errbanner { display: none; background: rgba(255,60,60,.25); color: white; padding: 10px 20px; font-size: 13px; text-align: center; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(70px); background: #1a1a1a; color: white; padding: 10px 22px; border-radius: 50px; font-size: 13px; font-family: inherit; transition: transform .3s cubic-bezier(.34,1.56,.64,1); z-index: 9999; white-space: nowrap; pointer-events: none; }
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-tag">활동</div>
  <div class="hero-title">포스트잇 질문</div>
  <div class="hero-sub"><span class="dot"></span><span id="heroSub">연결 중...</span></div>
  <div class="cards-row">
    <div class="q-card qc-y" onclick="openInput('yellow')">
      <div class="card-head"><span class="cdot cdot-y"></span>노랑 포스트잇</div>
      <div class="card-q">공짜로라도<br>하고 싶은 일은?</div>
      <div class="card-hint">탭해서 답변하기 ↓</div>
    </div>
    <div class="q-card qc-b" onclick="openInput('blue')">
      <div class="card-head"><span class="cdot cdot-b"></span>파랑 포스트잇</div>
      <div class="card-q">세상이 지금<br>필요로 하는 일은?</div>
      <div class="card-hint">탭해서 답변하기 ↓</div>
    </div>
  </div>
</div>

<div id="errbanner">⚠ 서버 연결 오류 — 잠시 후 자동으로 재시도합니다</div>

<div id="inputSection">
  <div class="il" id="iLabel"></div>
  <div class="iq"  id="iQuestion"></div>
  <textarea class="ans-area" id="ansText" placeholder="여기에 답변을 써보세요..."></textarea>
  <div class="irow">
    <input class="nfield" id="nameField" type="text" placeholder="이름 (선택, 최대 10자)" maxlength="10">
    <button class="cbtn" onclick="closeInput()">취소</button>
    <button class="pbtn" id="postBtn" onclick="submitAnswer()">붙이기 ✓</button>
  </div>
</div>

<div id="boardSection">
  <div class="btabs">
    <button class="tab ty"  id="tabY" onclick="switchTab('yellow')">🟡 노랑</button>
    <button class="tab toff" id="tabB" onclick="switchTab('blue')">🔵 파랑</button>
    <span class="bcnt" id="bcnt"></span>
  </div>
  <div id="boardGrid"></div>
</div>

<div id="toast"></div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbwSVenV2J8mh3Loa8P8gGW9cXndmNp6Y7Jg3QPY6RHtGL3E3nr6LqJ90bx5QzcRAvg/exec';

const Q = {
  yellow: { label:'노랑 포스트잇', q:'공짜로라도 하고 싶은 일은?' },
  blue:   { label:'파랑 포스트잇', q:'세상이 지금 필요로 하는 일은?' }
};

let activeColor = null, curTab = 'yellow';
let data = { yellow:[], blue:[] };

/* ─ API: GET 방식으로 읽기/쓰기 (CORS 자동 허용) ─ */
async function api(params) {
  const qs = new URLSearchParams({ ...params, _: Date.now() }).toString();
  const resp = await fetch(GAS + '?' + qs);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const text = await resp.text();
  return JSON.parse(text);
}

async function fetchData() {
  try {
    const res = await api({ action: 'get' });
    if (res && Array.isArray(res.yellow)) {
      data = res;
      renderBoard(curTab);
      updateSub(true);
    }
  } catch(e) {
    console.warn('poll error:', e);
    document.getElementById('errbanner').style.display = 'block';
    setTimeout(() => document.getElementById('errbanner').style.display = 'none', 4000);
  }
}

function openInput(color) {
  activeColor = color;
  document.getElementById('iLabel').textContent    = Q[color].label;
  document.getElementById('iQuestion').textContent = Q[color].q;
  document.getElementById('ansText').value  = '';
  document.getElementById('nameField').value = '';
  const s = document.getElementById('inputSection');
  s.classList.remove('open'); void s.offsetWidth; s.classList.add('open');
  setTimeout(() => document.getElementById('ansText').focus(), 80);
}
function closeInput() {
  document.getElementById('inputSection').classList.remove('open');
  activeColor = null;
}

async function submitAnswer() {
  const text = document.getElementById('ansText').value.trim();
  if (!text) { showToast('답변을 입력해 주세요 😊'); return; }
  const name = document.getElementById('nameField').value.trim() || '익명';
  const btn = document.getElementById('postBtn');
  btn.disabled = true; btn.textContent = '전송 중...';
  try {
    await api({ action:'post', color:activeColor, name, text });
    closeInput(); switchTab(activeColor);
    await fetchData();
    showToast('포스트잇이 붙었어요! 🎉');
  } catch(e) {
    console.error('submit error:', e);
    showToast('오류: ' + e.message + ' — Apps Script 배포 설정을 확인해 주세요');
  }
  btn.disabled = false; btn.textContent = '붙이기 ✓';
}

function switchTab(c) {
  curTab = c; renderBoard(c); updateSub(false);
  document.getElementById('tabY').className = 'tab ' + (c==='yellow'?'ty':'toff');
  document.getElementById('tabB').className = 'tab ' + (c==='blue'?'tb':'toff');
}
function renderBoard(c) {
  const list = data[c] || [];
  const g = document.getElementById('boardGrid');
  if (!list.length) { g.innerHTML = '<div class="empty">아직 답변이 없어요.<br>첫 번째로 붙여보세요! 📝</div>'; return; }
  const cls = c==='yellow'?'sy':'sb';
  g.innerHTML = '<div class="sgrid">'
    + list.slice().reverse().map(r =>
        '<div class="sticky '+cls+'"><div class="st">'+esc(r.text)+'</div><div class="sa">— '+esc(r.name)+'</div></div>'
      ).join('') + '</div>';
}
function updateSub(ok) {
  const total = (data.yellow||[]).length + (data.blue||[]).length;
  document.getElementById('heroSub').textContent = ok
    ? '총 '+total+'개의 답변이 모였어요'
    : document.getElementById('heroSub').textContent;
  document.getElementById('bcnt').textContent = (data[curTab]||[]).length + '개';
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}

fetchData();
setInterval(fetchData, 5000);
</script>
</body>
</html>
